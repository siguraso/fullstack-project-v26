spring.application.name=backend

spring.datasource.url=jdbc:h2:mem:regula
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=false
spring.h2.console.path=/h2-console
spring.sql.init.mode=always
spring.sql.init.platform=h2
spring.sql.init.data-locations=classpath:schema.sql,classpath:data.sql
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

#H2 database (in-memory)

# JWT configuration
security.jwt.secret=XiIGnXyfdw7Fw7q86QJe5XGyWNipkARsUshFlrPmTZx
security.jwt.expiration-ms=3600000

# Prevent Spring Security from creating a fallback generated user in tests
spring.security.user.name=test
spring.security.user.password=test

# Email configuration disabled for tests
email.resend.enabled=false

