services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: regula-backend
    environment:
      INVITE_FRONTEND_BASE_URL: http://localhost:8080
    ports:
      - "8081:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: regula-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
